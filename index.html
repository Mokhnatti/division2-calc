<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Division 2 — DPS Calculator</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #1e1e2e;
            --orange: #f5a623;
            --green: #00c853;
            --blue: #42a5f5;
            --yellow: #fdd835;
            --red: #ef5350;
            --text: #e0e0e0;
            --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #0d0d15 0%, #1a1a2e 100%);
            border-bottom: 2px solid var(--orange);
            padding: 24px;
            text-align: center;
        }
        .header h1 {
            color: var(--orange);
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .header p { color: var(--muted); margin-top: 6px; font-size: 14px; }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 24px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab:hover { border-color: var(--orange); color: var(--text); }
        .tab.active { background: var(--orange); color: #000; border-color: var(--orange); font-weight: 600; }
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 12px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--text); color: var(--text); }
        .filter-btn.active { font-weight: 600; }
        .filter-btn.active[data-filter="all"] { background: var(--orange); color: #000; border-color: var(--orange); }
        .filter-btn.active[data-filter="red"] { background: var(--red); color: #fff; border-color: var(--red); }
        .filter-btn.active[data-filter="blue"] { background: var(--blue); color: #fff; border-color: var(--blue); }
        .filter-btn.active[data-filter="yellow"] { background: var(--yellow); color: #000; border-color: var(--yellow); }
        .filter-btn.active[data-filter="mixed"] { background: #9c27b0; color: #fff; border-color: #9c27b0; }
        .search-box {
            display: flex;
            justify-content: center;
            padding: 0 16px 16px;
        }
        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .search-box input:focus { border-color: var(--orange); }
        .search-box input::placeholder { color: var(--muted); }
        .content { padding: 0 16px 40px; max-width: 1400px; margin: 0 auto; }
        .section-title {
            color: var(--orange);
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 24px 0 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 12px;
        }
        @media (max-width: 500px) {
            .grid { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--orange); }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .card-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--green);
        }
        .card-name-en {
            font-size: 11px;
            color: var(--muted);
            font-weight: 400;
        }
        .card-type {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .type-red { background: rgba(239,83,80,0.15); color: var(--red); border: 1px solid rgba(239,83,80,0.3); }
        .type-blue { background: rgba(66,165,245,0.15); color: var(--blue); border: 1px solid rgba(66,165,245,0.3); }
        .type-yellow { background: rgba(253,216,53,0.15); color: var(--yellow); border: 1px solid rgba(253,216,53,0.3); }
        .type-mixed { background: rgba(156,39,176,0.15); color: #ce93d8; border: 1px solid rgba(156,39,176,0.3); }
        .bonuses { margin-bottom: 10px; }
        .bonus-line {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 3px 0;
            font-size: 13px;
            line-height: 1.4;
        }
        .bonus-tier {
            min-width: 32px;
            font-weight: 700;
            color: var(--orange);
            font-size: 12px;
        }
        .bonus-text { color: var(--text); }
        .talents { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
        .talent-line {
            display: flex;
            gap: 8px;
            padding: 3px 0;
            font-size: 12px;
            line-height: 1.4;
        }
        .talent-icon { min-width: 16px; }
        .talent-name { color: var(--orange); font-weight: 600; min-width: 90px; }
        .talent-desc { color: var(--muted); }
        .brand-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            transition: border-color 0.2s;
        }
        .brand-card:hover { border-color: var(--orange); }
        .brand-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .brand-bonus {
            font-size: 12px;
            padding: 2px 0;
            color: var(--muted);

        .brand-bonus .val { color: var(--green); }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding: 12px;
            color: var(--muted);
            font-size: 12px;
        }
        .stats-bar span { color: var(--orange); font-weight: 600; }
        .hidden { display: none !important; }
    </style>
</head>

const typeLabels = { red: "DPS", blue: "Танк", yellow: "Навыки", mixed: "Гибрид" };

function renderGearSets(filter = "all", search = "") {
    const grid = document.getElementById("gear-grid");
    const s = search.toLowerCase();
    grid.innerHTML = gearSets
        .filter(g => (filter === "all" || g.type === filter) && (!s || g.name.toLowerCase().includes(s) || g.en.toLowerCase().includes(s)))
        .map(g => `
            <div class="card" data-type="${g.type}">
                <div class="card-header">
                    <div>
                        <div class="card-name">${g.name}</div>
                        <div class="card-name-en">${g.en}</div>
                    </div>
                    <span class="card-type type-${g.type}">${typeLabels[g.type]}</span>
                </div>
                <div class="bonuses">
                    ${g.bonuses.map(b => {
                        const [tier, ...rest] = b.split(": ");
                        return `<div class="bonus-line"><span class="bonus-tier">${tier}:</span><span class="bonus-text">${rest.join(": ")}</span></div>`;
                    }).join("")}
                </div>
                <div class="talents">
                    <div class="talent-line"><span class="talent-icon">🎽</span><span class="talent-name">Нагрудник:</span><span class="talent-desc">${g.chest}</span></div>
                    <div class="talent-line"><span class="talent-icon">🎒</span><span class="talent-name">Рюкзак:</span><span class="talent-desc">${g.backpack}</span></div>
                </div>
            </div>
        `).join("");
}

function renderBrands(search = "") {
    const grid = document.getElementById("brand-grid");
    const s = search.toLowerCase();
    grid.innerHTML = brandSets
        .filter(b => !s || b.name.toLowerCase().includes(s))
        .map(b => `
            <div class="brand-card">
                <div class="brand-name">${b.name}</div>
                <div class="brand-bonus"><span class="tier">1шт:</span> <span class="val">${b.b1}</span></div>
                <div class="brand-bonus"><span class="tier">2шт:</span> <span class="val">${b.b2}</span></div>
                <div class="brand-bonus"><span class="tier">3шт:</span> <span class="val">${b.b3}</span></div>
            </div>
        `).join("");
}

// Tabs
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        const t = tab.dataset.tab;
        document.getElementById("gearsets-panel").classList.toggle("hidden", t !== "gearsets");
        document.getElementById("brands-panel").classList.toggle("hidden", t !== "brands");
    });
});

// Filters
document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderGearSets(btn.dataset.filter, document.getElementById("search-gear").value);
    });
});

// Search
document.getElementById("search-gear").addEventListener("input", e => {
    const activeFilter = document.querySelector(".filter-btn.active")?.dataset.filter || "all";
    renderGearSets(activeFilter, e.target.value);
});
document.getElementById("search-brand").addEventListener("input", e => {
    renderBrands(e.target.value);
});

// Init
renderGearSets();
renderBrands();
</script>
