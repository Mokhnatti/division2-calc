            --bg: #0a0a0f;

            --border: #1e1e2e;
            --orange: #f5a623;
            --green: #00c853;
            --blue: #42a5f5;
            --yellow: #fdd835;
            --red: #ef5350;
            --text: #e0e0e0;
            --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; min-height: 100vh; }
        .header {
            background: linear-gradient(135deg, #0d0d15 0%, #1a1a2e 100%);
            border-bottom: 2px solid var(--orange);
            padding: 20px; text-align: center;
        }
        .header h1 { color: var(--orange); font-size: 26px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; }
        .header p { color: var(--muted); margin-top: 4px; font-size: 13px; }

        .search-panel {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 16px 20px; max-width: 900px; margin: 0 auto;
        }
        .search-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .search-row input {
            flex: 1; min-width: 200px; padding: 10px 14px;
            border: 1px solid var(--border); border-radius: 8px;
            background: var(--bg); color: var(--text); font-size: 14px; outline: none;
        }
        .search-row input:focus { border-color: var(--orange); }
        .search-row input::placeholder { color: #555; }
        .mode-row {
            display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
            padding: 8px 0 4px;
        }
        .mode-row label {
            display: flex; align-items: center; gap: 6px;
            cursor: pointer; font-size: 13px; color: var(--muted);
            user-select: none;
        }
        .mode-row input[type="radio"] { accent-color: var(--orange); }
        .mode-row .hint { font-size: 11px; color: #555; margin-left: 8px; }
        .result-count {
            text-align: center; padding: 8px; font-size: 12px; color: var(--muted);
        }
        .result-count span { color: var(--orange); font-weight: 700; }

        .content { padding: 0 16px 40px; max-width: 1400px; margin: 0 auto; }
        .section-title {
            color: var(--orange); font-size: 18px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            margin: 24px 0 12px; padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: baseline;
        }
        .section-title .count { font-size: 12px; color: var(--muted); font-weight: 400; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 10px;
        }
        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 16px; transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--orange); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-name { font-size: 15px; font-weight: 700; }
        .card-name.gear { color: var(--green); }
        .card-name.brand { color: var(--text); }
        .card-name.exotic { color: #ffab40; }
        .card-name-en { font-size: 11px; color: var(--muted); font-weight: 400; }
        .card-type {
            font-size: 10px; padding: 2px 10px; border-radius: 12px;
            font-weight: 600; text-transform: uppercase; white-space: nowrap;
        }
        .type-red { background: rgba(239,83,80,0.15); color: var(--red); border: 1px solid rgba(239,83,80,0.3); }
        .type-blue { background: rgba(66,165,245,0.15); color: var(--blue); border: 1px solid rgba(66,165,245,0.3); }
        .type-yellow { background: rgba(253,216,53,0.15); color: var(--yellow); border: 1px solid rgba(253,216,53,0.3); }
        .type-mixed { background: rgba(156,39,176,0.15); color: #ce93d8; border: 1px solid rgba(156,39,176,0.3); }
        .type-gear { background: rgba(0,200,83,0.12); color: var(--green); border: 1px solid rgba(0,200,83,0.25); }
        .type-brand { background: rgba(224,224,224,0.08); color: var(--muted); border: 1px solid rgba(224,224,224,0.15); }
        .type-exotic { background: rgba(255,171,64,0.12); color: #ffab40; border: 1px solid rgba(255,171,64,0.25); }
        .bonus-line { display: flex; gap: 8px; padding: 2px 0; font-size: 13px; line-height: 1.4; }
        .bonus-tier { min-width: 32px; font-weight: 700; color: var(--orange); font-size: 12px; }
        .bonus-text { color: var(--text); }
        .talents { border-top: 1px solid var(--border); padding-top: 6px; margin-top: 4px; }
        .talent-line { display: flex; gap: 6px; padding: 2px 0; font-size: 12px; line-height: 1.4; }
        .talent-icon { min-width: 14px; }
        .talent-name { color: var(--orange); font-weight: 600; }
        .talent-desc { color: var(--muted); }
        mark { background: rgba(245,166,35,0.3); color: var(--text); border-radius: 2px; padding: 0 1px; }
        .hidden { display: none !important; }
        .footer { text-align: center; padding: 16px; font-size: 11px; color: #444; }
    </style>
</head>

    { name: "Sawyer's Kneepads", cat: "exotic", group: "Наколенники", type: "Наколенники", talent: "Jammer", desc: "Перебежка из укрытия → Jammer Pulse в точке назначения + бонус к броне" },
    { name: "NinjaBike Kneepads", cat: "exotic", group: "Наколенники", type: "Наколенники", talent: "Parkour!", desc: "Перебежка из укрытия перезаряжает оружие. Только Тёмная Зона" },
    { name: "Blacklisters", cat: "exotic", group: "Наколенники", type: "Наколенники", talent: "Blacklisters", desc: "Y7/Y8" },
    // Кобуры
    { name: "Dodge City Gunslinger", cat: "exotic", group: "Кобуры", type: "Кобура", talent: "Quick Draw", desc: "Пистолет в кобуре +1 стак/0.3с (макс. 100). Смена: первый выстрел тратит стаки, +10% урона/стак. Считается хедшотом" },
    { name: "Imperial Dynasty", cat: "exotic", group: "Кобуры", type: "Кобура", talent: "Dragon's Glare", desc: "В бою поджигает ближайшего врага в 20м. КД 35с" },
    { name: "Waveform", cat: "exotic", group: "Кобуры", type: "Кобура", talent: "Frequency", desc: "Смена оружия → усиление связанное со Skill Tier и электрическими статусами" },
    { name: "Centurion's Scabbard", cat: "exotic", group: "Кобуры", type: "Кобура", talent: "Centurion's Scabbard", desc: "Усиление пистолетного урона, бонусы при убийствах пистолетом" },
    { name: "Shocker Punch", cat: "exotic", group: "Кобуры", type: "Кобура", talent: "Defibrillator", desc: "Рукопашный удар оглушает врага и восстанавливает часть брони" },
    { name: "Nimble Holster", cat: "exotic", group: "Кобуры", type: "Кобура", talent: "Nimble", desc: "Ускоренная смена оружия и мобильность" }
];

const typeLabels = { red: "DPS", blue: "Танк", yellow: "Навыки", mixed: "Гибрид" };

// ============ SEARCH ============

function getSearchText(item) {
    let parts = [item.name, item.en || "", item.type || ""];
    if (item.bonuses) parts.push(...item.bonuses);
    if (item.chest) parts.push(item.chest);
    if (item.backpack) parts.push(item.backpack);
    if (item.talent) parts.push(item.talent);
    if (item.desc) parts.push(item.desc);
    if (item.group) parts.push(item.group);
    return parts.join(" ").toLowerCase();
}

function matchesQuery(text, query) {
    if (!query) return true;
    const words = query.toLowerCase().trim().split(/\s+/);
    return words.every(w => text.includes(w));
}

function filterItems(items, queries, mode) {
    return items.filter(item => {
        const text = getSearchText(item);
        const results = queries.filter(q => q).map(q => matchesQuery(text, q));
        if (results.length === 0) return true;
        return mode === "and" ? results.every(r => r) : results.some(r => r);
    });
}

function highlightText(str, queries) {
    if (!queries.some(q => q)) return str;
    let result = str;
    queries.filter(q => q).forEach(q => {
        const words = q.toLowerCase().trim().split(/\s+/);
        words.forEach(w => {
            if (w.length < 2) return;
            const regex = new RegExp(`(${w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            result = result.replace(regex, '<mark>$1</mark>');
        });
    });
    return result;
}

// ============ RENDER ============

function renderAll() {
    const q = [
        document.getElementById("s1").value,
        document.getElementById("s2").value,
        document.getElementById("s3").value
    ];
    const mode = document.querySelector('input[name="mode"]:checked').value;
    const content = document.getElementById("main-content");
    const qs = q.filter(x => x);

    const filteredGear = filterItems(gearSets, q, mode);
    const filteredBrand = filterItems(brandSets, q, mode);
    const filteredExotic = filterItems(exoticItems, q, mode);

    const total = filteredGear.length + filteredBrand.length + filteredExotic.length;
    const allTotal = gearSets.length + brandSets.length + exoticItems.length;
    document.getElementById("result-count").innerHTML = qs.length > 0
        ? `Найдено: <span>${total}</span> из ${allTotal} (режим: ${mode === "and" ? "И — пересечения" : "ИЛИ — любое совпадение"})`
        : `Всего: <span>${allTotal}</span> предметов`;

    let html = "";

    // Gear Sets
    if (filteredGear.length > 0) {
        html += `<div class="section-title">Комплекты снаряжения (Gear Sets) <span class="count">${filteredGear.length}</span></div>`;
        html += '<div class="grid">';
        filteredGear.forEach(g => {
            const h = (s) => highlightText(s, q);
            html += `<div class="card">
                <div class="card-header">
                    <div><div class="card-name gear">${h(g.name)}</div><div class="card-name-en">${h(g.en)}</div></div>
                    <span class="card-type type-${g.type}">${typeLabels[g.type]}</span>
                </div>
                <div>${g.bonuses.map(b => {
                    const [tier, ...rest] = b.split(": ");
                    return `<div class="bonus-line"><span class="bonus-tier">${tier}:</span><span class="bonus-text">${h(rest.join(": "))}</span></div>`;
                }).join("")}</div>
                <div class="talents">
                    <div class="talent-line"><span class="talent-icon">🎽</span><span class="talent-name">Нагрудник:</span><span class="talent-desc">${h(g.chest)}</span></div>
                    <div class="talent-line"><span class="talent-icon">🎒</span><span class="talent-name">Рюкзак:</span><span class="talent-desc">${h(g.backpack)}</span></div>
                </div>
            </div>`;
        });
        html += '</div>';
    }

    // Brand Sets
    if (filteredBrand.length > 0) {
        html += `<div class="section-title">Брендовые наборы (Brand Sets) <span class="count">${filteredBrand.length}</span></div>`;
        html += '<div class="grid" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));">';
        filteredBrand.forEach(b => {
            const h = (s) => highlightText(s, q);
            html += `<div class="card">
                <div class="card-header">
                    <div class="card-name brand">${h(b.name)}</div>
                    <span class="card-type type-brand">Бренд</span>
                </div>
                ${b.bonuses.map(bn => {
                    const [tier, ...rest] = bn.split(": ");
                    return `<div class="bonus-line"><span class="bonus-tier">${tier}:</span><span class="bonus-text">${h(rest.join(": "))}</span></div>`;
                }).join("")}
            </div>`;
        });
        html += '</div>';
    }

    // Exotics by group
    if (filteredExotic.length > 0) {
        const groups = {};
        filteredExotic.forEach(e => {
            if (!groups[e.group]) groups[e.group] = [];
            groups[e.group].push(e);
        });
        const groupOrder = ["Штурмовые винтовки","Пистолеты-пулемёты","Ручные пулемёты","Дробовики","Снайперские винтовки","Винтовки","Пистолеты","Маски","Рюкзаки","Нагрудники","Перчатки","Наколенники","Кобуры"];
        html += `<div class="section-title">Экзотики (Exotics) <span class="count">${filteredExotic.length}</span></div>`;
        groupOrder.forEach(grp => {
            if (!groups[grp]) return;
            html += `<div style="color:#ffab40;font-size:14px;font-weight:600;margin:14px 0 8px;text-transform:uppercase;letter-spacing:1px;">${grp} (${groups[grp].length})</div>`;
            html += '<div class="grid">';
            groups[grp].forEach(e => {
                const h = (s) => highlightText(s, q);
                html += `<div class="card">
                    <div class="card-header">
                        <div class="card-name exotic">${h(e.name)}</div>
                        <span class="card-type type-exotic">${h(e.type)}</span>
                    </div>
                    <div class="talent-line" style="margin-bottom:4px"><span class="talent-name">${h(e.talent)}</span></div>
                    <div class="talent-desc" style="font-size:12px;line-height:1.5">${h(e.desc)}</div>
                </div>`;
            });
            html += '</div>';
        });
    }

    if (total === 0 && qs.length > 0) {
        html = '<div style="text-align:center;padding:60px 20px;color:#555;font-size:16px;">Ничего не найдено. Попробуй другие слова.</div>';
    }

    content.innerHTML = html;
}

// ============ EVENTS ============

document.querySelectorAll("#s1,#s2,#s3").forEach(el => el.addEventListener("input", renderAll));
document.querySelectorAll('input[name="mode"]').forEach(el => el.addEventListener("change", renderAll));

renderAll();
</script>
